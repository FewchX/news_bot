name: News Digest

on:
  # Каждый час с 05:00 до 21:00 UTC
  # DST-guard в main.py пропускает запуски вне 07:00–22:00 по Братиславе
  # Лето (CEST = UTC+2): 05–20 UTC = 07–22 local  → 16 дайджестов/день
  # Зима (CET  = UTC+1): 06–21 UTC = 07–22 local  → 16 дайджестов/день
  schedule:
    - cron: '0 5-21 * * *'
  # Ручной запуск для теста (FORCE_RUN=1, игнорирует проверку часа)
  workflow_dispatch:

concurrency:
  group: digest
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run digest
        env:
          GOOGLE_AI_STUDIO_KEY: ${{ secrets.GOOGLE_AI_STUDIO_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          FORCE_RUN: ${{ github.event_name == 'workflow_dispatch' && '1' || '' }}
        run: python main.py

      - name: Commit state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/seen.json state/user_settings.json
          git diff --staged --quiet || git commit -m "chore: update state [skip ci]"
          git pull --rebase
          git push
