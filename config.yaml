settings:
  hl: "en-US"
  gl: "US"
  ceid: "US:en"
  lookback_hours: 3  # используется только при ручном /news
  default_max_per_topic: 10
  # gemini-2.5-flash — быстрый (~3с), бесплатный, хорошо пишет по-русски
  model: "gemini-2.5-flash"

topics:
  # ── КРИТИЧНЫЕ — приходят ВСЕ новости без обрезки ──────────────────────────
  - name: "🥽 Even Realities"
    priority: critical
    queries:
      - '"Even Realities"'
      - '"Even Realities G1"'
      - '"Even Realities glasses"'
    extra_feeds:
      - "https://www.reddit.com/search/.rss?q=%22Even+Realities%22&sort=new"
    max_per_topic: null

  # ── ВЫСОКИЙ ПРИОРИТЕТ ──────────────────────────────────────────────────────
  - name: "🦸 AI Hero"
    priority: high
    queries:
      - '"Matt Pocock" AI'
    extra_feeds:
      - "https://www.aihero.dev/rss.xml"
      - "https://www.youtube.com/feeds/videos.xml?channel_id=UCswG6FSbgZjbWtdf_hMLaow"
    max_per_topic: 15

  # ── НОРМАЛЬНЫЙ ПРИОРИТЕТ ───────────────────────────────────────────────────
  - name: "🤖 Anthropic & Claude"
    priority: normal
    queries:
      - '"Anthropic" AI news'
      - '"Claude" Anthropic model'
      - '"Claude 4" OR "Claude 3" Anthropic'
    extra_feeds:
      - "https://www.youtube.com/feeds/videos.xml?channel_id=UCrDwWp7EBBv4NwvScIpBDOA"
      - "https://www.reddit.com/r/ClaudeAI/new/.rss"
      - "https://www.reddit.com/r/Anthropic/new/.rss"
    max_per_topic: 10

  - name: "💬 OpenAI & ChatGPT"
    priority: normal
    queries:
      - '"OpenAI" news'
      - '"ChatGPT" update'
      - '"GPT-4" OR "GPT-5" OpenAI'
    extra_feeds:
      - "https://www.reddit.com/r/ChatGPT/new/.rss"
      - "https://www.reddit.com/r/OpenAI/new/.rss"
    max_per_topic: 10

# ── Email рассылки (IMAP) ──────────────────────────────────────────────────────
email_sources:
  - name: "🥽 Even Realities"
    imap_host: "imap.gmail.com"
    username: "newsbot053@gmail.com"
    priority: critical
    max_per_source: null
    senders:
      - "evenrealities"
      - "even-realities"
      - "even realities"

  - name: "🦸 AI Hero"
    imap_host: "imap.gmail.com"
    username: "newsbot053@gmail.com"
    priority: high
    max_per_source: 15
    senders:
      - "aihero"
      - "ai-hero"
      - "mattpocock"
      - "matt pocock"

  # Всё остальное — catch-all
  - name: "📬 Рассылки"
    imap_host: "imap.gmail.com"
    username: "newsbot053@gmail.com"
    priority: normal
    max_per_source: 20
