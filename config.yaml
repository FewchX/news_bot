settings:
  hl: "en-US"
  gl: "US"
  ceid: "US:en"
  lookback_hours: 288
  default_max_per_topic: 10
  # gemini-2.5-flash — быстрый (~3с), бесплатный, хорошо пишет по-русски
  # gemma-4-31b-it   — тяжёлый (31B), на free tier таймаутится, но доступен
  model: "gemini-2.5-flash"

topics:
  # ── КРИТИЧНЫЕ — приходят ВСЕ новости без обрезки ──────────────────────────
  - name: "🥽 Even Realities"
    priority: critical
    queries:
      - '"Even Realities"'
      - '"Even Realities G1"'
      - '"Even Realities glasses"'
    extra_feeds: []
    max_per_topic: null  # null = без лимита для critical

  # ── ВЫСОКИЙ ПРИОРИТЕТ — все новости, коротко ──────────────────────────────
  - name: "🦸 AI Hero"
    priority: high
    queries:
      - '"Matt Pocock" AI'
    extra_feeds:
      - "https://www.aihero.dev/rss.xml"
    max_per_topic: 15

  # ── НОРМАЛЬНЫЙ ПРИОРИТЕТ — фильтрация и объединение разрешены ─────────────

  - name: "🤖 Anthropic & Claude"
    priority: normal
    queries:
      - '"Anthropic" AI news'
      - '"Claude" Anthropic model'
      - '"Claude 4" OR "Claude 3" Anthropic'
    extra_feeds:
      # Официальный YouTube канал Anthropic
      - "https://www.youtube.com/feeds/videos.xml?channel_id=UCrDwWp7EBBv4NwvScIpBDOA"
    max_per_topic: 10

  - name: "💬 OpenAI & ChatGPT"
    priority: normal
    queries:
      - '"OpenAI" news'
      - '"ChatGPT" update'
      - '"GPT-4" OR "GPT-5" OpenAI'
    extra_feeds: []
    max_per_topic: 10

  # Раскомментируй или добавь свои топики:

  # - name: "🤖 AI Agents"
  #   priority: normal
  #   queries:
  #     - "AI agents news 2025"
  #     - "LLM agents framework"
  #   max_per_topic: 8

  # - name: "🕶️ AR Glasses"
  #   priority: normal
  #   queries:
  #     - "AR smart glasses news"
  #     - "augmented reality glasses 2025"
  #   max_per_topic: 8

  # - name: "🧠 LLM News"
  #   priority: normal
  #   queries:
  #     - "large language model news"
  #     - "GPT Claude Gemini news"
  #   max_per_topic: 8

# ── Email рассылки (IMAP) ──────────────────────────────────────────────────────
# Порядок важен: каждый источник помечает письма как прочитанные,
# следующий их уже не видит → никаких дублей между разделами.
email_sources:
  # Even Realities — письма попадают в тот же раздел что и RSS-новости
  - name: "🥽 Even Realities"
    imap_host: "imap.gmail.com"
    username: "newsbot053@gmail.com"
    priority: critical
    max_per_source: null
    senders:
      - "evenrealities"
      - "even-realities"
      - "even realities"

  # AI Hero — письма от Matt Pocock
  - name: "🦸 AI Hero"
    imap_host: "imap.gmail.com"
    username: "newsbot053@gmail.com"
    priority: high
    max_per_source: 15
    senders:
      - "aihero"
      - "ai-hero"
      - "mattpocock"
      - "matt pocock"

  # Всё остальное — catch-all (подпишись на любые другие рассылки)
  - name: "📬 Рассылки"
    imap_host: "imap.gmail.com"
    username: "newsbot053@gmail.com"
    priority: normal
    max_per_source: 20
    # senders пустой = берём все непрочитанные письма
