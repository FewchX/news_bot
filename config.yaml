settings:
  hl: "en-US"
  gl: "US"
  ceid: "US:en"
  lookback_hours: 288
  default_max_per_topic: 10
  # gemini-2.5-flash — быстрый (~3с), бесплатный, хорошо пишет по-русски
  # gemma-4-31b-it   — тяжёлый (31B), на free tier таймаутится, но доступен
  model: "gemini-2.5-flash"

topics:
  # ── КРИТИЧНЫЕ — приходят ВСЕ новости без обрезки ──────────────────────────
  - name: "🥽 Even Realities"
    priority: critical
    queries:
      - '"Even Realities"'
      - '"Even Realities G1"'
      - '"Even Realities glasses"'
    extra_feeds: []
    max_per_topic: null  # null = без лимита для critical

  # ── ВЫСОКИЙ ПРИОРИТЕТ — все новости, коротко ──────────────────────────────
  - name: "🦸 AI Hero"
    priority: high
    queries:
      - '"Matt Pocock" AI'
    extra_feeds:
      - "https://www.aihero.dev/rss.xml"
    max_per_topic: 15

  # ── НОРМАЛЬНЫЙ ПРИОРИТЕТ — фильтрация и объединение разрешены ─────────────
  # Раскомментируй или добавь свои топики:

  # - name: "🤖 AI Agents"
  #   priority: normal
  #   queries:
  #     - "AI agents news 2025"
  #     - "LLM agents framework"
  #   max_per_topic: 8

  # - name: "🕶️ AR Glasses"
  #   priority: normal
  #   queries:
  #     - "AR smart glasses news"
  #     - "augmented reality glasses 2025"
  #   max_per_topic: 8

  # - name: "🧠 LLM News"
  #   priority: normal
  #   queries:
  #     - "large language model news"
  #     - "GPT Claude Gemini news"
  #   max_per_topic: 8

# ── Email рассылки (IMAP) ──────────────────────────────────────────────────────
# Подпишись на рассылки с newsbot053@gmail.com — они попадут в дайджест.
# Пароль приложения хранится в GitHub Secrets как GMAIL_APP_PASSWORD.
email_sources:
  - name: "📬 Рассылки"
    imap_host: "imap.gmail.com"
    username: "newsbot053@gmail.com"
    priority: high
    max_per_source: 20
    # Опционально — фильтр по отправителям (если пусто — берём все письма):
    # senders:
    #   - "newsletter@aihero.dev"
    #   - "digest@tldr.tech"
